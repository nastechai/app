name: Auto Label PRs

# Automatically labels PRs based on which paths changed.
# Also labels issues when they are opened.
on:
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-pr:
    name: Label PR by changed paths
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  label-pr-type:
    name: Label PR by title type
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();

            const typeMap = {
              'feat':     { label: 'type/feature',     color: '0075ca' },
              'fix':      { label: 'type/bug-fix',     color: 'd73a4a' },
              'docs':     { label: 'type/docs',        color: '0e8a16' },
              'ci':       { label: 'type/ci',          color: 'e4e669' },
              'build':    { label: 'type/build',       color: 'fbca04' },
              'refactor': { label: 'type/refactor',    color: 'c5def5' },
              'perf':     { label: 'type/perf',        color: 'bfd4f2' },
              'test':     { label: 'type/test',        color: 'f9d0c4' },
              'chore':    { label: 'type/chore',       color: 'fef2c0' },
              'deps':     { label: 'type/dependencies','color': 'c5def5' },
              'security': { label: 'security',         color: 'ee0701' },
            };

            const prNum = context.payload.pull_request.number;
            for (const [prefix, { label, color }] of Object.entries(typeMap)) {
              if (title.startsWith(prefix + ':') || title.startsWith(prefix + '(')) {
                // Ensure label exists
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner, repo: context.repo.repo,
                    name: label, color,
                  });
                } catch (_) {}
                await github.rest.issues.addLabels({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: prNum, labels: [label],
                });
                console.log(`Labeled PR #${prNum} as ${label}`);
                break;
              }
            }

  label-issue:
    name: Label new issues
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.issue.body || '').toLowerCase();
            const title = context.payload.issue.title.toLowerCase();
            const text = title + ' ' + body;
            const issueNum = context.payload.issue.number;

            const labelRules = [
              { keywords: ['crash', 'error', 'fail', 'broken', 'not work', 'cannot'],
                label: 'bug', color: 'd73a4a' },
              { keywords: ['android', 'apk', 'proot', 'shmem', 'bionic'],
                label: 'android', color: 'e4e669' },
              { keywords: ['install', 'setup', 'bootstrap', 'rootfs'],
                label: 'setup', color: '84b6eb' },
              { keywords: ['dns', 'network', 'github', 'git', 'clone'],
                label: 'networking', color: '0075ca' },
              { keywords: ['python', 'pip', 'nastech-agent', 'uv'],
                label: 'python', color: '3572A5' },
              { keywords: ['performance', 'slow', 'speed', 'fast'],
                label: 'performance', color: 'bfd4f2' },
              { keywords: ['feature', 'request', 'suggest', 'would be nice'],
                label: 'enhancement', color: 'a2eeef' },
            ];

            const toAdd = [];
            for (const rule of labelRules) {
              if (rule.keywords.some(kw => text.includes(kw))) {
                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner, repo: context.repo.repo,
                    name: rule.label, color: rule.color,
                  });
                } catch (_) {}
                toAdd.push(rule.label);
              }
            }

            if (toAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issueNum, labels: toAdd,
              });
            }
