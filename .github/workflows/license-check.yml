name: License Compliance

on:
  push:
    branches: [main, 'release/**']
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'flutter_app/pubspec.yaml'
      - '.github/workflows/license-check.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  npm-licenses:
    name: Check npm Licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install license-checker
        run: npm install -g license-checker

      - name: Check licenses
        run: |
          license-checker \
            --onlyAllow "MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;0BSD;CC0-1.0;Unlicense;Python-2.0" \
            --excludePrivatePackages \
            --out license-report.txt

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: npm-license-report
          path: license-report.txt

  flutter-licenses:
    name: Check Flutter Licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Generate license report
        working-directory: flutter_app
        run: flutter pub deps --json > deps-report.json

      - name: Upload Flutter deps report
        uses: actions/upload-artifact@v4
        with:
          name: flutter-deps-report
          path: flutter_app/deps-report.json
