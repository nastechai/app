name: APK Size Check

# Guards against APK size regressions. Fails if the arm64 APK grows by more
# than 5% compared to the last successful build on main, or exceeds a hard cap.
on:
  pull_request:
    branches: [main]
    paths:
      - 'flutter_app/**'
      - 'scripts/fetch-proot-binaries.sh'
      - '.github/workflows/apk-size-check.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  size-check:
    name: APK Size Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('flutter_app/android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            flutter_app/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('flutter_app/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Fetch PRoot binaries
        run: bash scripts/fetch-proot-binaries.sh

      - name: Get Flutter deps
        working-directory: flutter_app
        run: flutter pub get

      - name: Build arm64 APK
        working-directory: flutter_app
        run: flutter build apk --release --target-platform android-arm64

      - name: Measure APK size
        id: sizes
        run: |
          APK="flutter_app/build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK" ]; then
            APK=$(find flutter_app/build -name "*.apk" | head -1)
          fi

          SIZE_BYTES=$(stat -c%s "$APK")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)

          echo "APK: $APK"
          echo "Size: ${SIZE_MB} MB (${SIZE_BYTES} bytes)"

          echo "size_bytes=$SIZE_BYTES" >> "$GITHUB_OUTPUT"
          echo "size_mb=$SIZE_MB" >> "$GITHUB_OUTPUT"
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"

          # Hard cap: 200 MB
          MAX_BYTES=$((200 * 1024 * 1024))
          if [ "$SIZE_BYTES" -gt "$MAX_BYTES" ]; then
            echo "ERROR: APK exceeds 200 MB hard cap (${SIZE_MB} MB)"
            exit 1
          fi
          echo "✓ APK size ${SIZE_MB} MB is under 200 MB cap"

      - name: Analyse APK contents
        run: |
          APK="${{ steps.sizes.outputs.apk_path }}"
          echo "=== Top 20 largest entries in APK ==="
          unzip -l "$APK" | sort -rn -k1 | head -25

          echo ""
          echo "=== jniLibs sizes ==="
          unzip -l "$APK" "lib/*" | grep -v "^Archive\|^---\|files" | sort -rn -k1 | head -20

          echo ""
          echo "=== Assets size ==="
          unzip -l "$APK" "assets/*" | tail -3

      - name: Post size report on PR
        uses: actions/github-script@v7
        with:
          script: |
            const sizeMb = '${{ steps.sizes.outputs.size_mb }}';
            const sizeBytes = parseInt('${{ steps.sizes.outputs.size_bytes }}');
            const body = [
              '## 📦 APK Size Report',
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| arm64-v8a APK | **${sizeMb} MB** |`,
              `| Hard cap | 200 MB |`,
              `| Status | ${parseFloat(sizeMb) < 150 ? '✅ OK' : parseFloat(sizeMb) < 200 ? '⚠️ Getting large' : '❌ Over cap'} |`,
              '',
              '_This comment is updated on every push to this PR._',
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const bot = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('APK Size Report'));
            if (bot) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: bot.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number, body,
              });
            }
