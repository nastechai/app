name: Security Audit

on:
  push:
    branches: [main, 'release/**']
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/security-audit.yml'
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  npm-audit:
    name: npm Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate

  python-audit:
    name: Python Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      # Install the actual package so pip-audit has real deps to scan.
      # Use --no-deps on the nastech-agent install to avoid pulling hundreds of
      # packages that may have no Python 3.12 wheel yet on CI; pip-audit will
      # still resolve transitives from the metadata.
      - name: Install nastech-agent for auditing
        run: |
          pip install --quiet 'nastech-agent[termux]' \
            || pip install --quiet nastech-agent \
            || pip install --quiet openai httpx pydantic rich fastapi uvicorn \
            || true

      - name: Audit installed Python packages
        # exit-code 1 when vulnerabilities are found — keep as warning in CI
        # by using continue-on-error; a human should review the output.
        run: pip-audit --desc on --skip-editable 2>/dev/null || pip-audit --desc on
        continue-on-error: true
