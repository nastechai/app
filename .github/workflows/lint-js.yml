name: Lint JavaScript

on:
  push:
    branches: [main, 'release/**', 'hotfix/**', 'feature/**']
    paths:
      - '**.js'
      - 'lib/**'
      - 'bin/**'
      - 'eslint.config.js'
      - 'package.json'
      - '.github/workflows/lint-js.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings 0
