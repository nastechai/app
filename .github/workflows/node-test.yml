name: Node.js Tests

on:
  push:
    branches: [main, 'release/**', 'hotfix/**', 'feature/**']
    paths:
      - 'lib/**'
      - 'bin/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/node-test.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Node.js ${{ matrix.node }} Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22', '23']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          CI: true

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
